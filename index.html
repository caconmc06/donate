<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Thanh Toán & Ủng Hộ</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            margin-bottom: 25px;
            transition: transform 0.2s ease;
        }

        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: var(--text-main);
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Section */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.15s ease-in-out;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 15px;
        }

        button:hover { background-color: #0056b3; }
        
        button.btn-secondary {
            background-color: #28a745;
        }
        button.btn-secondary:hover { background-color: #218838; }

        /* QR Section */
        .qr-wrapper {
            text-align: center;
            padding: 20px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px dashed #ced4da;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bank-info {
            font-size: 1.1rem;
            font-weight: 600;
            color: #005A3C;
            margin-bottom: 15px;
        }

        .qr-image {
            max-width: 250px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: opacity 0.3s ease;
        }

        .note {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
        }

        /* Result Alert */
        .alert {
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .masked-card-display {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-family: monospace;
            margin-top: 10px;
            color: #2c3e50;
            background: rgba(255,255,255,0.6);
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                1. Tạo mã QR Chuyển Khoản
            </h2>
            
            <div class="form-group">
                <label for="qrAmount">Số tiền (VNĐ) - Bỏ trống nếu muốn tuỳ tâm:</label>
                <input type="number" id="qrAmount" placeholder="VD: 50000" min="0">
            </div>
            
            <div class="form-group">
                <label for="qrMessage">Nội dung chuyển khoản - Bỏ trống để tự nhập:</label>
                <input type="text" id="qrMessage" placeholder="VD: Donate Cacon MC" maxlength="50">
            </div>

            <button class="btn-secondary" onclick="capNhatQR()">Cập nhật mã QR ngay</button>

            <div class="qr-wrapper">
                <div class="bank-info">
                    Ngân hàng: Vietcombank<br>
                    STK: 1364453518
                </div>
                <img id="qrCodeImage" src="https://img.vietqr.io/image/vcb-1364453518-compact2.png" alt="Mã QR Vietcombank" class="qr-image">
                <p class="note">Mở App ngân hàng để quét mã.<br>Thông tin sẽ tự động điền theo tuỳ chọn của bạn.</p>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                2. Liên kết thẻ (Thử nghiệm)
            </h2>
            <p class="note" style="margin-top: 0; margin-bottom: 20px;">Hỗ trợ thẻ nội địa và quốc tế (Visa/Mastercard/JCB).</p>
            
            <div class="form-group">
                <label for="cardNumber">Số thẻ ngân hàng:</label>
                <input type="text" id="cardNumber" placeholder="Nhập số in trên thẻ của bạn..." maxlength="19" oninput="this.value = this.value.replace(/[^0-9]/g, '')" autocomplete="off">
            </div>
            
            <button onclick="xacMinhThe()">Xác Minh & Liên Kết</button>

            <div id="alertBox" class="alert"></div>
        </div>
    </div>

    <script>
        // --- Logic cập nhật mã QR ---
        function capNhatQR() {
            const amount = document.getElementById('qrAmount').value.trim();
            const message = document.getElementById('qrMessage').value.trim();
            const qrImage = document.getElementById('qrCodeImage');
            
            // Link gốc mặc định
            let baseUrl = "https://img.vietqr.io/image/vcb-1364453518-compact2.png";
            let params = [];

            // Kiểm tra xem có nhập số tiền hay không
            if (amount !== "") {
                params.push("amount=" + amount);
            }

            // Kiểm tra xem có nhập nội dung hay không
            if (message !== "") {
                // Phải encode URI để nội dung có dấu cách/tiếng Việt không làm lỗi link
                params.push("addInfo=" + encodeURIComponent(message));
            }

            // Nếu có tham số, nối chúng vào link gốc bằng dấu ? và &
            if (params.length > 0) {
                baseUrl += "?" + params.join("&");
            }

            // Tạo hiệu ứng mờ đi một chút khi load QR mới
            qrImage.style.opacity = 0.3;
            
            // Gán link mới cho ảnh
            qrImage.src = baseUrl;

            // Đợi ảnh load xong thì cho hiện rõ lại
            qrImage.onload = function() {
                qrImage.style.opacity = 1;
            };
        }

        // --- Logic xác minh thẻ ---
        function xacMinhThe() {
            const inputElement = document.getElementById('cardNumber');
            const cardNumber = inputElement.value.trim();
            const alertBox = document.getElementById('alertBox');

            alertBox.style.display = 'none';
            alertBox.className = 'alert';
            alertBox.innerHTML = '';

            if (cardNumber === "" || cardNumber.length < 16) {
                alertBox.classList.add('alert-danger');
                alertBox.innerHTML = '<strong>✘ Xác minh thất bại!</strong><br>Số thẻ không hợp lệ. Vui lòng kiểm tra lại độ dài của thẻ.';
                alertBox.style.display = 'block';
                return;
            }

            const first6 = cardNumber.substring(0, 6);
            const last4 = cardNumber.substring(cardNumber.length - 4);
            const maskedCard = `${first6} ****** ${last4}`;

            alertBox.classList.add('alert-success');
            alertBox.innerHTML = `
                <strong>✔ Liên kết thẻ thành công!</strong><br>
                Đã xác minh thẻ hợp lệ trên hệ thống.<br>
                <div class="masked-card-display">${maskedCard}</div>
            `;
            alertBox.style.display = 'block';
            inputElement.value = '';
        }
    </script>
</body>
</html>
