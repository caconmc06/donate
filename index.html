<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Bơm Máu (Donate)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(10, 10, 15, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Share Tech Mono', monospace; /* Font chữ kiểu hacker/máy tính */
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Tạo background lưới grid chìm */
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .cyber-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            padding: 30px 20px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2), 
                        inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Góc viền trang trí kiểu vi mạch */
        .cyber-container::before, .cyber-container::after {
            content: ''; position: absolute; width: 20px; height: 20px;
        }
        .cyber-container::before { top: -1px; left: -1px; border-top: 2px solid var(--neon-pink); border-left: 2px solid var(--neon-pink); }
        .cyber-container::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--neon-pink); border-right: 2px solid var(--neon-pink); }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a0aab5;
            text-shadow: none;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--neon-cyan);
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            background: rgba(0, 243, 255, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Cyber Button */
        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* QR Section */
        .qr-section {
            text-align: center;
            border-top: 1px dashed rgba(0, 243, 255, 0.3);
            padding-top: 25px;
        }

        .system-msg {
            font-size: 0.85rem;
            color: var(--neon-pink);
            margin-bottom: 15px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .qr-frame {
            display: inline-block;
            padding: 10px;
            background: #fff; /* Nền trắng bắt buộc để app ngân hàng dễ quét */
            border-radius: 8px;
            position: relative;
        }

        /* Viền quét bao quanh QR */
        .qr-frame::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            pointer-events: none;
        }

        .qr-image {
            display: block;
            width: 250px;
            height: auto;
            transition: opacity 0.3s ease;
        }

        .terminal-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="cyber-container">
        <div class="header">
            <h1>[ TRẠM BƠM MÁU ]</h1>
            <p class="subtitle">>>> INITIALIZING DONATE PROTOCOL...<br>Cứu rỗi một tâm hồn đang gặm mì tôm.</p>
        </div>

        <div class="form-group">
            <label>> SỐ_LƯỢNG_MÁU (VNĐ):</label>
            <input type="number" id="qrAmount" placeholder="VD: 50000 (Để trống = Tuỳ tâm)">
        </div>
        
        <div class="form-group">
            <label>> LỜI_NHẮN_GỬI:</label>
            <input type="text" id="qrMessage" placeholder="VD: Donate an mi tom them trung" maxlength="50">
        </div>

        <button onclick="capNhatQR()">[ THIẾT LẬP MÃ QUÉT ]</button>

        <div class="qr-section">
            <div class="system-msg">TARGET ACC: VCB - 1364453518</div>
            <div class="qr-frame">
                <img id="qrCodeImage" src="https://img.vietqr.io/image/vcb-1364453518-compact.png" alt="Mã QR Vietcombank" class="qr-image">
            </div>
            <p class="terminal-text">System.out.println("Cảm ơn nhà tài trợ!");</p>
        </div>
    </div>

    <script>
        function capNhatQR() {
            const amount = document.getElementById('qrAmount').value.trim();
            const message = document.getElementById('qrMessage').value.trim();
            const qrImage = document.getElementById('qrCodeImage');
            
            // Link gốc mặc định dạng compact
            let baseUrl = "https://img.vietqr.io/image/vcb-1364453518-compact.png";
            let params = [];

            if (amount !== "") {
                params.push("amount=" + amount);
            }

            if (message !== "") {
                params.push("addInfo=" + encodeURIComponent(message));
            }

            if (params.length > 0) {
                baseUrl += "?" + params.join("&");
            }

            // Hiệu ứng "đang nạp dữ liệu"
            qrImage.style.opacity = 0.2;
            
            // Đổi mã
            qrImage.src = baseUrl;

            qrImage.onload = function() {
                qrImage.style.opacity = 1;
            };
        }
    </script>
</body>
</html>
